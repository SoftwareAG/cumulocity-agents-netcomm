# PRIVATE CONFIG FILE:
[[ -f ~/.jh.conf.priv ]] && . ~/.jh.conf.priv

# SPECIAL DEFINITIONS:

DEF_exportTelstra=(
  ["chef_unlock"]='f_chefUnlock(){
  local decryptKey="$1";
  sudo su -c "( [[ ! -e /dev/mapper/chef_volume && -e /root/encrypted-chef-env.bin ]] && cryptsetup --key-file <( base64 -d <<< "${decryptKey}" ) luksOpen /root/encrypted-chef-env.bin chef_volume )";
  mountpoint -q /opt/cumulocity || sudo mount -t ext4 /dev/mapper/chef_volume /opt/cumulocity;
}'
)

